<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculatrice</title>
</head>
<body>
    
<div class="calculatrice">
    <div class="ecran">0</div>
    <div class="touche">
        <!-- Row 1 -->
        <button class="bouton dark" data-key="c">AC</button>
        <button class="bouton dark" data-key="Backspace">DEL</button>
        <button class="bouton orange" data-key="%">%</button>
        <button class="bouton orange" data-key="/">/</button>
        
        <!-- Row 2 -->
        <button class="bouton dark" data-key="7">7</button>
        <button class="bouton dark" data-key="8">8</button>
        <button class="bouton dark" data-key="9">9</button>
        <button class="bouton orange" data-key="*">*</button>
        
        <!-- Row 3 -->
        <button class="bouton dark" data-key="4">4</button>
        <button class="bouton dark" data-key="5">5</button>
        <button class="bouton dark" data-key="6">6</button>
        <button class="bouton orange" data-key="-">-</button>
        
        <!-- Row 4 -->
        <button class="bouton dark" data-key="1">1</button>
        <button class="bouton dark" data-key="2">2</button>
        <button class="bouton dark" data-key="3">3</button>
        <button class="bouton orange" data-key="+">+</button>
        
        <!-- Row 5 -->
        <button class="bouton dark span-2" data-key="0">0</button>
        <button class="bouton dark" data-key=".">.</button>
        <button class="bouton green" data-key="Enter">=</button>
    </div>
</div>

<div class="footer">
    <p>Créé par <strong>Diene Thiam</strong></p>
</div>

<script src="script.js"></script>
</body>
</html>
